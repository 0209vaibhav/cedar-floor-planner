<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Floor Planner Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <h1 class="title">Cedar Floor Planner</h1>
    
    <div class="dashboard">

        <div class="side-panel">
    
            <div class="card">
                <h3>Legend</h3>
                <hr>
    
                <div class="legend-row">
                    <span class="legend-box common-box"></span>
                    <span>Common Spaces</span>
                </div>
    
                <div class="legend-row">
                    <span class="legend-box private-box"></span>
                    <span>Private Spaces</span>
                </div>
    
            </div>
    
            <div class="card">
                <div id="metrics"></div>
            </div>
    
        </div>
    
        <div class="canvas-panel">
            <svg id="floorplan"></svg>
        </div>
    
    </div>
    
    <script src="app.js"></script>

    <div id="tooltip"></div>
    
    </body>
</html>
